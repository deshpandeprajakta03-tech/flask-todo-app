<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>📝 My To-Do List</h1>

    <form action="/add" method="POST" class="add-form">
      <input type="text" name="task" placeholder="Add a new task..." required autocomplete="off"/>
      <button type="submit">Add</button>
    </form>

    <ul class="todo-list">
      {% for todo in todos %}
      <li class="todo-item {% if todo.done %}done{% endif %}">
        <span class="task-text">{{ todo.task }}</span>
        <div class="actions">
          <a href="/toggle/{{ todo.id }}" class="btn-toggle">
            {% if todo.done %}↩ Undo{% else %}✔ Done{% endif %}
          </a>
          <a href="/delete/{{ todo.id }}" class="btn-delete">🗑 Delete</a>
        </div>
      </li>
      {% else %}
      <li class="empty">No tasks yet — add one above!</li>
      {% endfor %}
    </ul>

    <p class="footer">{{ todos|selectattr('done')|list|length }} / {{ todos|length }} tasks completed</p>
  </div>
</body>
</html>
